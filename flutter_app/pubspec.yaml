name: btf_resume
description: BTF Resume - Local AI Resume Helper Desktop App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP and Networking
  http: ^1.1.0
  dio: ^5.4.0
  
  # State Management
  provider: ^6.1.0
  
  # File Handling
  file_picker: ^5.5.0
  path_provider: ^2.1.1
  
  # JSON Serialization
  json_annotation: ^4.11.0
  
  # Logging
  logger: ^2.1.0
  
  # UI Components
  flutter_markdown: ^0.6.17
  google_fonts: ^6.2.0
  
  # File/System
  url_launcher: ^6.2.0
  syncfusion_flutter_pdfviewer: ^24.2.9
  window_manager: ^0.3.8
  
  # Embedded Python Runtime
  py_engine_desktop: ^1.1.0
  
  # Auto Updates
  flutter_desktop_updater:
    git:
      url: https://github.com/qasimovv/flutter_desktop_updater.git
      ref: main
  
  # Process Execution
  process_run: ^0.14.1
  
  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/python/
    - assets/ollama/
    - assets/models/
    
    - assets/python/backend/app.py
    - assets/python/backend/config.py
    - assets/python/backend/wsgi.py
    - assets/python/backend/__init__.py
    - assets/python/backend/routes/
    - assets/python/backend/services/
    - assets/python/core/
    - assets/python/requirements.txt
