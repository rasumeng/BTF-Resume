name: Build and Release

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: false
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build Windows
        run: |
          cd flutter_app
          flutter clean
          flutter pub get
          flutter build windows --release

      - name: Create installer
        run: |
          cd installer/windows
          if (Get-Command makensis -ErrorAction SilentlyContinue) {
            & makensis installer.nsi
          } else {
            choco install nsis -y
            & makensis installer.nsi
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            flutter_app/build/windows/x64/runner/Release/**
            installer/windows/*.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build macOS
        run: |
          cd flutter_app
          flutter clean
          flutter pub get
          flutter build macos --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: flutter_app/build/macos/Release/**
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev pkg-config liblzma-dev libstdc++-12-dev

      - name: Build Linux
        run: |
          cd flutter_app
          flutter clean
          flutter pub get
          flutter build linux --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: flutter_app/build/linux/x64/release/**
          retention-days: 30

  release:
    needs: [build-windows, build-macos, build-linux]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-app/*.app
            artifacts/linux-app/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}